name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: PYTHONDONTWRITEBYTECODE=1 pytest -p no:cacheprovider -v
      - run: starforge --output /tmp/starforge-smoke --width 320 --height 440 --frames 4 --seed 260613 --preset neon-collapse --seed-gallery 4 --batch 6 --top-k 3 --supersample 1 --scale-preview
      - run: python tools/inspect_outputs.py /tmp/starforge-smoke
