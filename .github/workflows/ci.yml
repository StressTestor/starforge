name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: PYTHONDONTWRITEBYTECODE=1 pytest -p no:cacheprovider -v
      - run: starforge --output /tmp/starforge-smoke --width 320 --height 440 --frames 4 --seed 260613 --preset neon-collapse --seed-gallery 4 --batch 6 --top-k 3 --supersample 1 --scale-preview
      - run: python tools/inspect_outputs.py /tmp/starforge-smoke
